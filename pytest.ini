[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    unit: Unit tests (fast, no external deps)
    integration: Integration tests (may need services)
    load: Load/performance tests
    slow: Tests that take > 1s
asyncio_mode = auto

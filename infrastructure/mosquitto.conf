# Mosquitto MQTT Broker Configuration
# For EcoTronics edge device communication

# ============================================================================
# LISTENERS
# ============================================================================

# Default MQTT listener
listener 1883
protocol mqtt

# WebSocket listener (for browser-based clients)
listener 9883
protocol websockets

# ============================================================================
# PERSISTENCE
# ============================================================================

persistence true
persistence_location /mosquitto/data/

# ============================================================================
# LOGGING
# ============================================================================

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

log_type error
log_type warning
log_type notice
log_type information

# Log all messages
log_type all

# Connection messages
connection_messages true

# Timestamp format
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ============================================================================
# SECURITY (Development Mode - Change for Production!)
# ============================================================================

# Allow anonymous connections (DEVELOPMENT ONLY)
allow_anonymous true

# For production, use authentication:
# allow_anonymous false
# password_file /mosquitto/config/passwd
# acl_file /mosquitto/config/acl

# ============================================================================
# PERFORMANCE
# ============================================================================

# Maximum queued messages
max_queued_messages 1000

# Maximum packet size (10MB)
message_size_limit 10485760

# ============================================================================
# TOPICS (for reference)
# ============================================================================

# Device publishes to:
#   ecotronics/device/{device_id}/readings
#   ecotronics/device/{device_id}/status
#   ecotronics/device/{device_id}/alerts

# Backend publishes to:
#   ecotronics/device/{device_id}/commands
#   ecotronics/device/{device_id}/config

# ============================================================================
# BRIDGE (for cloud sync - optional)
# ============================================================================

# Uncomment to bridge to cloud MQTT broker
# connection cloud-bridge
# address mqtt.cloud.example.com:1883
# topic ecotronics/# out 0
# bridge_protocol_version mqttv311
